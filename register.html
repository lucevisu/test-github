
<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Đăng Ký Khóa Học</title>
<a href="index.html" class="btn btn-danger">
🏠 Về Trang Chủ
</a>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<body>
<link rel="stylesheet" href="assets/css/style.css">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
<div class="container">
<a class="navbar-brand" href="index.html">CourseHub</a>
</div>
</nav>

<div class="container py-5">

<div class="row justify-content-center">

<div class="col-md-8">

<div class="form-box">

<h2 class="text-center mb-4">
Đăng Ký Khóa Học
</h2>

<form id="registerForm">

<div class="mb-3">
<label>Họ và Tên</label>
<input type="text" id="fullname" class="form-control">
<div id="nameError" class="error"></div>
</div>

<div class="mb-3">
<label>Email</label>
<input type="email" id="email" class="form-control">
<div id="emailError" class="error"></div>
</div>

<div class="mb-3">
<label>Số Điện Thoại</label>
<input type="text" id="phone" class="form-control">
<div id="phoneError" class="error"></div>
</div>

<div class="mb-3">
<label>Lớp</label>
<input type="text" id="studentClass" class="form-control">
<div id="classError" class="error"></div>
</div>

<div class="mb-3">
<label>Khóa Học</label>

<select id="course" class="form-select">
<option value="">-- Chọn khóa học --</option>
<option>HTML CSS Cơ Bản</option>
<option>JavaScript DOM</option>
<option>Bootstrap 5</option>
<option>ReactJS</option>
<option>NodeJS</option>
<option>PHP MySQL</option>
<option>Python Cơ Bản</option>
<option>Git & GitHub</option>
</select>

<div id="courseError" class="error"></div>

</div>

<div class="mb-3">

<label>Ghi Chú</label>

<textarea
id="note"
rows="4"
class="form-control">
</textarea>

</div>

<button
type="submit"
class="btn btn-success w-100">

Đăng Ký

</button>

<button
type="button"
class="btn btn-danger w-100 mt-2"
id="clearBtn">

Xóa Dữ Liệu

</button>

</form>

<div id="successMessage" class="mt-3"></div>

</div>

</div>

</div>

</div>

<script>

const form =
document.getElementById("registerForm");

form.addEventListener("submit",function(e){

e.preventDefault();

document.getElementById("nameError").innerHTML="";
document.getElementById("emailError").innerHTML="";
document.getElementById("phoneError").innerHTML="";
document.getElementById("classError").innerHTML="";
document.getElementById("courseError").innerHTML="";

let valid = true;

const fullname =
document.getElementById("fullname").value.trim();

const email =
document.getElementById("email").value.trim();

const phone =
document.getElementById("phone").value.trim();

const studentClass =
document.getElementById("studentClass").value.trim();

const course =
document.getElementById("course").value;

const note =
document.getElementById("note").value;

if(fullname.length < 3){

document.getElementById("nameError").innerHTML =
"Họ tên phải từ 3 ký tự trở lên";

valid = false;

}

const emailRegex =
/^[^\s@]+@[^\s@]+\.[^\s@]+$/;

if(!emailRegex.test(email)){

document.getElementById("emailError").innerHTML =
"Email không hợp lệ";

valid = false;

}

const phoneRegex =
/^[0-9]{9,11}$/;

if(!phoneRegex.test(phone)){

document.getElementById("phoneError").innerHTML =
"Số điện thoại từ 9-11 số";

valid = false;

}

if(studentClass === ""){

document.getElementById("classError").innerHTML =
"Vui lòng nhập lớp";

valid = false;

}

if(course === ""){

document.getElementById("courseError").innerHTML =
"Vui lòng chọn khóa học";

valid = false;

}

if(valid){

let registrations =
JSON.parse(
localStorage.getItem("registrations")
) || [];

registrations.push({

fullname,
email,
phone,
studentClass,
course,
note

});

localStorage.setItem(
"registrations",
JSON.stringify(registrations)
);

document.getElementById("successMessage").innerHTML =

`<div class="alert alert-success">
Đăng ký thành công!
</div>`;

form.reset();

}

});

</script>

</body>
</html>
