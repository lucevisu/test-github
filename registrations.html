<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Danh Sách Đăng Ký</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet" href="assets/css/style.css">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-primary">

<div class="container">

<a class="navbar-brand" href="index.html">
CourseHub
</a>

<div>

<a href="index.html" class="btn btn-light btn-sm">
Trang Chủ
</a>

<a href="courses.html" class="btn btn-light btn-sm">
Khóa Học
</a>

<a href="register.html" class="btn btn-light btn-sm">
Đăng Ký
</a>

</div>

</div>

</nav>

<div class="container py-5">

<h2 class="text-center mb-4">
Danh Sách Đăng Ký
</h2>

<div class="table-box">

<div class="d-flex justify-content-end mb-3">

<button
class="btn btn-danger"
onclick="deleteAll()">

Xóa Tất Cả

</button>

</div>

<div class="table-responsive">

<table class="table table-bordered table-hover">

<thead class="table-dark">

<tr>
<th>STT</th>
<th>Họ Tên</th>
<th>Email</th>
<th>SĐT</th>
<th>Lớp</th>
<th>Khóa Học</th>
<th>Ghi Chú</th>
<th>Thao Tác</th>
</tr>

</thead>

<tbody id="registrationList">

</tbody>

</table>

</div>

</div>

</div>

<script>

let registrations =
JSON.parse(
localStorage.getItem("registrations")
) || [];

function renderRegistrations(){

const list =
document.getElementById("registrationList");

list.innerHTML = "";

if(registrations.length === 0){

list.innerHTML = `
<tr>
<td colspan="8" class="text-center text-danger">
Chưa có dữ liệu đăng ký
</td>
</tr>
`;

return;
}

registrations.forEach((item,index)=>{

list.innerHTML += `

<tr>

<td>${index+1}</td>

<td>${item.fullname}</td>

<td>${item.email}</td>

<td>${item.phone}</td>

<td>${item.studentClass}</td>

<td>${item.course}</td>

<td>${item.note}</td>

<td>

<button
class="btn btn-sm btn-danger"
onclick="deleteRegistration(${index})">

Xóa

</button>

</td>

</tr>

`;

});

}

function deleteRegistration(index){

if(confirm("Bạn có chắc muốn xóa?")){

registrations.splice(index,1);

localStorage.setItem(
"registrations",
JSON.stringify(registrations)
);

renderRegistrations();

}

}

function deleteAll(){

if(confirm("Xóa toàn bộ danh sách?")){

localStorage.removeItem("registrations");

registrations = [];

renderRegistrations();

}

}

renderRegistrations();

</script>

</body>
</html>
