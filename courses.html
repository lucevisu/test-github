<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>CourseHub - Danh Sách Khóa Học</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="assets/css/style.css">

</head>
<body>

<!-- Navbar -->

<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
<div class="container">

<a class="navbar-brand fw-bold" href="index.html">
CourseHub
</a>

<button class="navbar-toggler"
data-bs-toggle="collapse"
data-bs-target="#menu">
<span class="navbar-toggler-icon"></span>
</button>

<div class="collapse navbar-collapse" id="menu">

<ul class="navbar-nav ms-auto">

<li class="nav-item">
<a class="nav-link" href="index.html">Trang Chủ</a>
</li>

<li class="nav-item">
<a class="nav-link active" href="courses.html">Khóa Học</a>
</li>

<li class="nav-item">
<a class="nav-link" href="register.html">Đăng Ký</a>
</li>

<li class="nav-item">
<a class="nav-link" href="registrations.html">Danh Sách</a>
</li>

</ul>

</div>
</div>
</nav>

<!-- Header -->

<section class="container py-5">

<h1 class="text-center mb-4">
Danh Sách Khóa Học
</h1>

<div class="row mb-4">

<div class="col-md-4 mb-2">
<input
type="text"
id="searchInput"
class="form-control"
placeholder="Tìm kiếm khóa học..."
>
</div>

<div class="col-md-3 mb-2">
<select id="categoryFilter" class="form-select">

<option value="all">
Tất cả danh mục
</option>

<option value="Frontend">
Frontend
</option>

<option value="Backend">
Backend
</option>

<option value="Programming">
Programming
</option>

<option value="Tools">
Tools
</option>

</select>
</div>

<div class="col-md-3 mb-2">

<select id="levelFilter" class="form-select">

<option value="all">
Tất cả cấp độ
</option>

<option value="Beginner">
Beginner
</option>

<option value="Intermediate">
Intermediate
</option>

<option value="Advanced">
Advanced
</option>

</select>

</div>

<div class="col-md-2 mb-2">

<button
class="btn btn-danger w-100"
onclick="resetFilter()">

Reset

</button>

</div>

</div>

<div class="row" id="courseList"></div>

</section>

<!-- Modal -->

<div class="modal fade" id="courseModal">

<div class="modal-dialog modal-lg">

<div class="modal-content">

<div class="modal-header">

<h5 class="modal-title">
Chi Tiết Khóa Học
</h5>

<button
class="btn-close"
data-bs-dismiss="modal">
</button>

</div>

<div class="modal-body" id="modalContent">

</div>

</div>

</div>

</div>

<script>

const courses = [

{
id:1,
title:"HTML CSS Cơ Bản",
category:"Frontend",
level:"Beginner",
date:"2026-07-10",
image:"https://picsum.photos/500/300?1",
description:"Học nền tảng HTML CSS.",
detail:"Tìm hiểu cấu trúc HTML5, CSS3, Flexbox, Grid và Responsive Website."
},

{
id:2,
title:"JavaScript DOM",
category:"Frontend",
level:"Intermediate",
date:"2026-07-15",
image:"https://picsum.photos/500/300?2",
description:"JavaScript tương tác web.",
detail:"DOM, Event, LocalStorage và xử lý dữ liệu."
},

{
id:3,
title:"Bootstrap 5",
category:"Frontend",
level:"Beginner",
date:"2026-07-20",
image:"https://picsum.photos/500/300?3",
description:"Thiết kế giao diện nhanh.",
detail:"Grid System, Navbar, Card, Modal và Responsive."
},

{
id:4,
title:"ReactJS",
category:"Frontend",
level:"Advanced",
date:"2026-08-01",
image:"https://picsum.photos/500/300?4",
description:"Framework Frontend hiện đại.",
detail:"Component, Props, State, Hooks."
},

{
id:5,
title:"NodeJS",
category:"Backend",
level:"Intermediate",
date:"2026-08-05",
image:"https://picsum.photos/500/300?5",
description:"Xây dựng API Backend.",
detail:"ExpressJS, Routing, Middleware."
},

{
id:6,
title:"PHP MySQL",
category:"Backend",
level:"Intermediate",
date:"2026-08-10",
image:"https://picsum.photos/500/300?6",
description:"Website động với PHP.",
detail:"CRUD Database, Form Processing."
},

{
id:7,
title:"Python Cơ Bản",
category:"Programming",
level:"Beginner",
date:"2026-08-15",
image:"https://picsum.photos/500/300?7",
description:"Ngôn ngữ lập trình Python.",
detail:"Biến, Hàm, Điều kiện, Vòng lặp."
},

{
id:8,
title:"Git & GitHub",
category:"Tools",
level:"Beginner",
date:"2026-08-20",
image:"https://picsum.photos/500/300?8",
description:"Quản lý source code.",
detail:"Commit, Push, Pull Request và GitHub."
}

];

const courseList = document.getElementById("courseList");

function renderCourses(data){

courseList.innerHTML="";

if(data.length===0){

courseList.innerHTML=`
<div class="col-12">
<div class="alert alert-warning">
Không tìm thấy khóa học nào.
</div>
</div>
`;

return;
}

data.forEach(course=>{

courseList.innerHTML += `

<div class="col-lg-3 col-md-6 mb-4">

<div class="card h-100 shadow course-card">

<img src="${course.image}" class="card-img-top">

<div class="card-body">

<h5>${course.title}</h5>

<span class="badge bg-primary">
${course.category}
</span>

<span class="badge bg-success">
${course.level}
</span>

<p class="mt-2">
${course.description}
</p>

<p>
<small>${course.date}</small>
</p>

<button
class="btn btn-primary w-100"
onclick="showDetail(${course.id})">

Xem Chi Tiết

</button>

</div>

</div>

</div>

`;

});

}

function showDetail(id){

const course = courses.find(c=>c.id===id);

document.getElementById("modalContent").innerHTML=`

<img
src="${course.image}"
class="img-fluid rounded mb-3">

<h3>${course.title}</h3>

<p>
<strong>Danh mục:</strong>
${course.category}
</p>

<p>
<strong>Cấp độ:</strong>
${course.level}
</p>

<p>
<strong>Ngày học:</strong>
${course.date}
</p>

<p>
${course.detail}
</p>

<a
href="register.html"
class="btn btn-success">

Đăng Ký Ngay

</a>

`;

new bootstrap.Modal(
document.getElementById("courseModal")
).show();

}

function filterCourses(){

const keyword =
document.getElementById("searchInput")
.value.toLowerCase();

const category =
document.getElementById("categoryFilter")
.value;

const level =
document.getElementById("levelFilter")
.value;

const filtered = courses.filter(course=>{

const matchKeyword =
course.title.toLowerCase()
.includes(keyword);

const matchCategory =
category==="all" ||
course.category===category;

const matchLevel =
level==="all" ||
course.level===level;

return matchKeyword &&
matchCategory &&
matchLevel;

});

renderCourses(filtered);

}

function resetFilter(){

document.getElementById("searchInput").value="";

document.getElementById("categoryFilter").value="all";

document.getElementById("levelFilter").value="all";

renderCourses(courses);

}

document.getElementById("searchInput")
.addEventListener("input",filterCourses);

document.getElementById("categoryFilter")
.addEventListener("change",filterCourses);

document.getElementById("levelFilter")
.addEventListener("change",filterCourses);

renderCourses(courses);

</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
